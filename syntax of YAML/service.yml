apiVersion: v1
kind: Service
metadata:
  name: nginx-service  # Changed name to be more descriptive
  labels:
    app: nginx-svc
spec:
  type: ClusterIP      # Default type. Exposes service on a cluster-internal IP.
  selector:
    app: nginx         # CRITICAL: This must match your Pod labels exactly
  ports:
    - protocol: TCP
      port: 80         # The port the Service exposes
      targetPort: 80   # The port the Container is listening on
