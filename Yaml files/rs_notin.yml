apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-not_in
  labels: 
    app: rs-not_in
spec: 
  selector:
    matchExpressions: 
      - {key: app , operator: NotIn , values: [rsapp,  new-app , nginx-in]  }
  replicas: 3 
  template: 
    metadata:
      name: nginx
      labels: 
        app: nginx-not_in
    spec: 
      containers:
        - name: nginx
          image: nginx:latest
          ports: 
            - containerPort: 80
