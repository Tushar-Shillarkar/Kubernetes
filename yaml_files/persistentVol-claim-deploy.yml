apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy
  labels: 
    app: nginx-deploy
spec: 
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        
      maxUnavailable: 1
  selector:
    matchLabels:
      app: nginx-deploy
  replicas: 2 
  template: 
    metadata:
      labels: 
        app: nginx-deploy
    spec: 
      containers:
      - name: nginx
        image: nginx:latest
        ports: 
        - containerPort: 80
        volumeMounts:
        - mountPath: /var/www/html
          name: my-volume
      volumes:  
      - name: my-volume
        persistentVolumeClaim:
          claimName: local-pvc
