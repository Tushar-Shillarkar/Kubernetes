apiVersion: v1
kind: ReplicationController
metadata:
  name: nginx-rc          # Name of the controller
spec:
  replicas: 4             # Number of copies you want
  selector:
    app: nginx            # Must match the labels in the template below
  template:               # This is exactly your Pod definition
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
